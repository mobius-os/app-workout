name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app
        uses: actions/checkout@v4

      - name: Checkout Mobius runtime
        uses: actions/checkout@v4
        with:
          repository: mobius-os/mobius
          path: .mobius
          sparse-checkout: frontend/public/mobius-runtime.js
          sparse-checkout-cone-mode: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Test
        env:
          MOBIUS_RUNTIME: ${{ github.workspace }}/.mobius/frontend/public/mobius-runtime.js
        run: npm test
